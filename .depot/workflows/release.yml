name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Semver release tag, for example v0.1.0
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: depot-ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Validate version
        env:
          VERSION: ${{ inputs.version }}
        run: |
          echo "$VERSION" | grep -Eq '^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$' || {
            echo "version must look like v0.1.0" >&2
            exit 1
          }
          if git rev-parse "$VERSION" >/dev/null 2>&1; then
            echo "$VERSION already exists" >&2
            exit 1
          fi
      - name: Check
        run: make check
      - name: Build release binaries
        env:
          VERSION: ${{ inputs.version }}
        run: |
          make cross-compile VERSION="$VERSION" COMMIT="${GITHUB_SHA::7}" DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          cd dist
          sha256sum bgst-* > checksums.txt
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ inputs.version }}
        run: >-
          gh release create "$VERSION"
          dist/bgst-*
          dist/checksums.txt
          --target "$GITHUB_SHA"
          --title "$VERSION"
          --generate-notes
          --draft
      - name: Publish immutable release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ inputs.version }}
        run: gh release edit "$VERSION" --draft=false --latest
